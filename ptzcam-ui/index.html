<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTZ Cam Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-light: #f8f8f8;
            --bg-white: #ffffff;
            --bg-dark: #1a1a1a;
            --border-light: #e8e8e8;
            --border-color: #d0d0d0;
            --text-dark: #333333;
            --text-secondary: #666666;
            --accent-blue: #2c79d0;
            --accent-blue-hover: #3690f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Toolbar */
        .toolbar {
            height: 175px;
            background-color: var(--bg-white);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
        }

        .toolbar-header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-light);
            gap: 16px;
        }

        .toolbar-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar-title svg {
            width: 24px;
            height: 24px;
            color: var(--accent-blue);
        }

        .toolbar-spacer {
            flex: 1;
        }

        .toolbar-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-white);
            color: var(--text-dark);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: var(--bg-light);
            border-color: var(--accent-blue);
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        .btn-primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-blue-hover);
        }

        .toolbar-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .device-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .device-label {
            font-size: 13px;
            color: var(--text-secondary);
            min-width: 60px;
        }

        .device-select {
            flex: 1;
            max-width: 300px;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            background-color: var(--bg-white);
        }

        /* Main Content - Video Preview */
        .main-content {
            flex: 1;
            background-color: var(--bg-white);
            padding: 0 33px 0 33px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .preview-container {
            flex: 1;
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 0;
        }

        .video-placeholder {
            text-align: center;
            color: #666;
        }

        .video-placeholder svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .video-placeholder p {
            font-size: 14px;
            color: #888;
        }

        .video-info {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: rgba(0,0,0,0.7);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
        }

        .video-stream {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Bottom Control Bar */
        .control-bar {
            height: 283px;
            background-color: var(--bg-white);
            border-top: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
        }

        .control-tabs {
            height: 48px;
            display: flex;
            border-bottom: 1px solid var(--border-light);
            padding: 0 20px;
            gap: 4px;
        }

        .tab {
            padding: 0 20px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.15s;
        }

        .tab:hover {
            color: var(--text-dark);
            background-color: var(--bg-light);
        }

        .tab.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
            font-weight: 500;
        }

        .control-content {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 40px;
            overflow-x: auto;
        }

        .control-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-label {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 50px;
        }

        .radio-group {
            display: flex;
            gap: 8px;
        }

        .radio-btn {
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-white);
            color: var(--text-dark);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .radio-btn:hover {
            border-color: var(--accent-blue);
        }

        .radio-btn.active {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .slider-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider {
            width: 150px;
            height: 4px;
            border-radius: 2px;
            background-color: var(--border-light);
            outline: none;
            cursor: pointer;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            cursor: pointer;
        }

        .slider-value {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 40px;
            text-align: right;
            font-family: monospace;
        }

        /* PTZ Controls */
        .ptz-controls {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .ptz-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .ptz-dpad {
            display: grid;
            grid-template-columns: repeat(3, 44px);
            grid-template-rows: repeat(3, 44px);
            gap: 4px;
        }

        .ptz-dpad .ptz-btn:nth-child(1) { grid-column: 2; grid-row: 1; }
        .ptz-dpad .ptz-btn:nth-child(2) { grid-column: 1; grid-row: 2; }
        .ptz-dpad .ptz-btn:nth-child(3) { grid-column: 2; grid-row: 2; }
        .ptz-dpad .ptz-btn:nth-child(4) { grid-column: 3; grid-row: 2; }
        .ptz-dpad .ptz-btn:nth-child(5) { grid-column: 2; grid-row: 3; }

        .ptz-btn {
            width: 44px;
            height: 44px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            color: var(--text-dark);
        }

        .ptz-btn:hover {
            background-color: var(--bg-light);
            border-color: var(--accent-blue);
        }

        .ptz-btn.primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .ptz-btn.primary:hover {
            background-color: var(--accent-blue-hover);
        }

        .ptz-btn svg {
            width: 18px;
            height: 18px;
        }

        .ptz-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(4, 50px);
            gap: 8px;
        }

        .preset-btn {
            width: 50px;
            height: 40px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-white);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.15s;
        }

        .preset-btn:hover {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .zoom-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .zoom-btn {
            width: 50px;
            height: 40px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .zoom-btn:hover {
            background-color: var(--bg-light);
            border-color: var(--accent-blue);
        }

        .zoom-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Divider */
        .section-divider {
            width: 1px;
            height: 100%;
            background-color: var(--border-light);
        }

        /* Checkbox */
        .checkbox-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-control input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-blue);
        }

        .checkbox-control label {
            font-size: 12px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- Top Toolbar -->
    <header class="toolbar">
        <div class="toolbar-header">
            <div class="toolbar-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 7l-7 5 7 5V7z"/>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                </svg>
                PTZ Cam Tools
            </div>
            <div class="toolbar-spacer"></div>
            <div class="toolbar-actions">
                <button class="btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    设置
                </button>
                <button class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    连接设备
                </button>
            </div>
        </div>
        <div class="toolbar-content">
            <div class="device-section">
                <span class="device-label">当前设备:</span>
                <select class="device-select">
                    <option>PTZ Camera 01 (192.168.1.100)</option>
                    <option>USB Camera</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Main Content - Video Preview -->
    <main class="main-content">
        <div class="preview-container">
            <div class="video-placeholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M23 7l-7 5 7 5V7z"/>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                </svg>
                <p>等待视频连接...</p>
            </div>
            <div class="video-info">1920x1080 30fps</div>
        </div>
    </main>

    <!-- Bottom Control Bar -->
    <footer class="control-bar">
        <div class="control-tabs">
            <div class="tab active">PTZ 控制</div>
            <div class="tab">图像设置</div>
            <div class="tab">预设位</div>
        </div>
        <div class="control-content">
            <!-- PTZ Controls -->
            <div class="control-section">
                <div class="control-section-title">云台控制</div>
                <div class="ptz-controls">
                    <div class="ptz-section">
                        <div class="ptz-dpad">
                            <button class="ptz-btn" title="上">⬆</button>
                            <button class="ptz-btn" title="左">⬅</button>
                            <button class="ptz-btn primary" title="Home">🏠</button>
                            <button class="ptz-btn" title="右">➡</button>
                            <button class="ptz-btn" title="下">⬇</button>
                        </div>
                        <span class="ptz-label">云台方向</span>
                    </div>

                    <div class="section-divider"></div>

                    <div class="ptz-section">
                        <div class="zoom-controls">
                            <button class="zoom-btn" title="Zoom In">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"/>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                    <line x1="11" y1="8" x2="11" y2="14"/>
                                    <line x1="8" y1="11" x2="14" y2="11"/>
                                </svg>
                            </button>
                            <button class="zoom-btn" title="Zoom Out">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"/>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                    <line x1="8" y1="11" x2="14" y2="11"/>
                                </svg>
                            </button>
                        </div>
                        <span class="ptz-label">变焦</span>
                    </div>
                </div>
            </div>

            <div class="section-divider"></div>

            <!-- Image Settings -->
            <div class="control-section">
                <div class="control-section-title">图像设置</div>
                <div class="control-row">
                    <span class="control-label">Focus</span>
                    <div class="radio-group">
                        <button class="radio-btn active">Auto</button>
                        <button class="radio-btn">Manual</button>
                    </div>
                </div>
                <div class="control-row">
                    <span class="control-label"></span>
                    <div class="slider-control">
                        <input type="range" class="slider" min="0" max="100" value="50" id="focusSlider">
                        <span class="slider-value" id="focusValue">50</span>
                    </div>
                </div>
                <div class="control-row" style="margin-top: 12px;">
                    <span class="control-label">Exposure</span>
                    <div class="radio-group">
                        <button class="radio-btn active">Auto</button>
                        <button class="radio-btn">Manual</button>
                    </div>
                </div>
                <div class="control-row">
                    <span class="control-label"></span>
                    <div class="slider-control">
                        <input type="range" class="slider" min="0" max="100" value="50" id="expSlider">
                        <span class="slider-value" id="expValue">50</span>
                    </div>
                </div>
            </div>

            <div class="section-divider"></div>

            <!-- Presets -->
            <div class="control-section">
                <div class="control-section-title">预设位</div>
                <div class="preset-grid">
                    <button class="preset-btn">1</button>
                    <button class="preset-btn">2</button>
                    <button class="preset-btn">3</button>
                    <button class="preset-btn">4</button>
                    <button class="preset-btn">5</button>
                    <button class="preset-btn">6</button>
                    <button class="preset-btn">7</button>
                    <button class="preset-btn">8</button>
                </div>
            </div>

            <div class="section-divider"></div>

            <!-- Additional Controls -->
            <div class="control-section">
                <div class="control-section-title">高级设置</div>
                <div class="control-row">
                    <span class="control-label">白平衡</span>
                    <div class="radio-group">
                        <button class="radio-btn active">Auto</button>
                        <button class="radio-btn">Manual</button>
                    </div>
                </div>
                <div class="control-row" style="margin-top: 12px;">
                    <div class="checkbox-control">
                        <input type="checkbox" id="backlight">
                        <label for="backlight">背光补偿</label>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Radio button toggle
        document.querySelectorAll('.radio-group').forEach(group => {
            group.querySelectorAll('.radio-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    group.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
        });

        // Slider value update
        document.getElementById('focusSlider').addEventListener('input', e => {
            document.getElementById('focusValue').textContent = e.target.value;
        });
        document.getElementById('expSlider').addEventListener('input', e => {
            document.getElementById('expValue').textContent = e.target.value;
        });

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });

        // Button press feedback
        document.querySelectorAll('.ptz-btn, .preset-btn, .zoom-btn').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.style.transform = 'scale(0.95)');
            btn.addEventListener('mouseup', () => btn.style.transform = 'scale(1)');
            btn.addEventListener('mouseleave', () => btn.style.transform = 'scale(1)');
        });
    </script>
</body>
</html>
